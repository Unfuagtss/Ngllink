<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anonymous Message</title>
<style>
body {
    background: #2b2d31;
    font-family: Arial;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: #1e1f22;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
}
textarea {
    width: 100%;
    height: 100px;
    margin-bottom: 10px;
}
button {
    width: 100%;
    padding: 10px;
    background: #5865f2;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="box">
<h3>Anonymous Message</h3>
<textarea id="msg"></textarea>
<button onclick="send()">Send</button>
</div>

<script>
async function send() {
    const message = document.getElementById("msg").value;

    await fetch("/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message})
    });

    alert("Sent!");
}
</script>

</body>
</html>
